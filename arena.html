<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Needful Thingz - Arena V4</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser3-rex-plugins@1.1.39/dist/rexvirtualjoystickplugin.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
    const config = {
        type: Phaser.AUTO,
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
            width: 800,
            height: 400
        },
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 800 }, debug: false }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    const game = new Phaser.Game(config);
    
    // Core Variables
    let player;
    let joyStickLeft;
    let joyStickRight;
    let actionText; 
    let facingDirection = 0; // 0 = right, Math.PI = left
    
    // Movement Variables
    let jumps = 0;
    let joystickUpReleased = true;
    
    // Combat Variables
    let currentWeapon = 'Assault Rifle';
    let specialCharge = 0;
    const specialMax = 100;
    let specialReady = false;
    let meleeHitbox;
    
    // UI Elements
    let specialButton;
    let specialGraphics; 

    function preload() {
        this.load.plugin('rexvirtualjoystickplugin', 'https://cdn.jsdelivr.net/npm/phaser3-rex-plugins@1.1.39/dist/rexvirtualjoystickplugin.min.js', true);
    }

    function create() {
        // 1. The Arena Floor
        const floor = this.add.rectangle(400, 380, 800, 40, 0x444444);
        this.physics.add.existing(floor, true); 

        // 2. The Symmetrical Central Island
        const islandTop = this.add.rectangle(400, 180, 250, 20, 0x666666);
        const islandMid = this.add.rectangle(400, 220, 80, 60, 0x555555);
        const islandBot = this.add.rectangle(400, 260, 250, 20, 0x666666);
        
        this.physics.add.existing(islandTop, true);
        this.physics.add.existing(islandMid, true);
        this.physics.add.existing(islandBot, true);

        // 3. The Player
        player = this.add.rectangle(400, 300, 30, 50, 0x00aaff);
        this.physics.add.existing(player);
        player.body.setCollideWorldBounds(true);
        
        // 4. Melee Hitbox (The physical reach)
        meleeHitbox = this.add.rectangle(-100, -100, 40, 15, 0xffaa00).setAlpha(0);
        this.physics.add.existing(meleeHitbox);
        meleeHitbox.body.setAllowGravity(false);
        
        // Collisions
        this.physics.add.collider(player, floor);
        this.physics.add.collider(player, islandTop);
        this.physics.add.collider(player, islandMid);
        this.physics.add.collider(player, islandBot);

        // UI Text
        actionText = this.add.text(400, 30, 'Equipped: Assault Rifle', { fontSize: '20px', fill: '#ffffff' }).setOrigin(0.5);

        // --- CONTROLS ---

        joyStickLeft = this.plugins.get('rexvirtualjoystickplugin').add(this, {
            x: 120, y: 300, radius: 50,
            base: this.add.circle(0, 0, 60, 0x888888).setAlpha(0.3),
            thumb: this.add.circle(0, 0, 30, 0xcccccc).setAlpha(0.5),
            dir: '8dir', forceMin: 16
        });

        const leftTapZone = this.add.circle(120, 300, 25, 0xffffff, 0).setInteractive();
        leftTapZone.on('pointerdown', () => {
            if (jumps < 3) {
                player.body.setVelocityY(-450);
                jumps++;
                actionText.setText('Triple Jump: ' + jumps + '/3');
            }
        });

        joyStickRight = this.plugins.get('rexvirtualjoystickplugin').add(this, {
            x: 680, y: 300, radius: 50,
            base: this.add.circle(0, 0, 60, 0x888888).setAlpha(0.3),
            thumb: this.add.circle(0, 0, 30, 0xff0000).setAlpha(0.5),
            dir: '8dir', forceMin: 16
        });

        const rightTapZone = this.add.circle(680, 300, 25, 0xffffff, 0).setInteractive();
        rightTapZone.on('pointerdown', () => {
            let bullet = this.add.rectangle(player.x, player.y, 15, 5, 0xffff00);
            this.physics.add.existing(bullet);
            bullet.body.setAllowGravity(false); 
            
            let angle = joyStickRight.force > 0 ? joyStickRight.rotation : player.rotation;
            this.physics.velocityFromRotation(angle, 800, bullet.body.velocity);
            
            actionText.setText('PEW! PEW!');
            this.time.delayedCall(1000, () => { bullet.destroy(); });
        });

        // --- ACTION BUTTONS ---

        const btnMelee = this.add.circle(570, 300, 25, 0xffaa00).setAlpha(0.5).setInteractive();
        this.add.text(552, 292, 'HIT', { fontSize: '14px', fill: '#fff', fontStyle: 'bold' });
        btnMelee.on('pointerdown', () => {
            actionText.setText('Action: MELEE ATTACK!');
            player.fillColor = 0xffaa00; 
            meleeHitbox.setAlpha(1);
            
            // Push hitbox out based on facing direction
            let reachX = facingDirection === 0 ? 35 : -35; 
            meleeHitbox.setPosition(player.x + reachX, player.y);
            meleeHitbox.rotation = facingDirection;

            this.time.delayedCall(150, () => { 
                player.fillColor = 0x00aaff;
                meleeHitbox.setAlpha(0);
                meleeHitbox.setPosition(-100, -100); 
            });
        });

        const btnSwap = this.add.circle(600, 210, 25, 0xaaaaaa).setAlpha(0.5).setInteractive();
        this.add.text(582, 202, 'SWAP', { fontSize: '12px', fill: '#fff', fontStyle: 'bold' });
        btnSwap.on('pointerdown', () => {
            currentWeapon = currentWeapon === 'Assault Rifle' ? 'Shotgun' : 'Assault Rifle';
            actionText.setText('Equipped: ' + currentWeapon);
        });

        specialButton = this.add.circle(680, 180, 30, 0x555555).setAlpha(0.7).setInteractive();
        this.add.text(660, 172, 'ULT', { fontSize: '16px', fill: '#fff', fontStyle: 'bold' });
        specialGraphics = this.add.graphics();
        
        specialButton.on('pointerdown', () => {
            if (specialReady) {
                actionText.setText('Action: SPECIAL UNLEASHED!');
                player.scaleX = 1.5; 
                player.scaleY = 1.5;
                player.fillColor = 0x00ffff;
                
                this.time.delayedCall(500, () => {
                    player.scaleX = 1;
                    player.scaleY = 1;
                    player.fillColor = 0x00aaff;
                });
                
                specialCharge = 0;
                specialReady = false;
                specialButton.setFillStyle(0x555555); 
                specialGraphics.clear();
            } else {
                actionText.setText('Special is still charging...');
            }
        });
    }

    function update() {
        const speed = 250;
        
        // Direction tracking and movement
        if (joyStickLeft.left) {
            player.body.setVelocityX(-speed);
            facingDirection = Math.PI; // Face Left (180 degrees)
        } else if (joyStickLeft.right) {
            player.body.setVelocityX(speed);
            facingDirection = 0; // Face Right (0 degrees)
        } else {
            player.body.setVelocityX(0);
        }

        if (player.body.touching.down) {
            jumps = 0;
        }

        if (joyStickLeft.up) {
            if (joystickUpReleased && jumps < 3) {
                player.body.setVelocityY(-450);
                jumps++;
                joystickUpReleased = false;
                actionText.setText('Triple Jump: ' + jumps + '/3');
            }
        } else {
            joystickUpReleased = true;
        }

        // Aiming Logic: Snap back to forward direction when stick is released
        if (joyStickRight.force > 0) {
            player.rotation = joyStickRight.rotation; 
        } else {
            player.rotation = facingDirection; 
        }

        if (!specialReady) {
            specialCharge += 0.2; 
            let chargePercentage = specialCharge / specialMax;
            
            specialGraphics.clear();
            specialGraphics.lineStyle(6, 0x00ffff, 1);
            specialGraphics.beginPath();
            specialGraphics.arc(680, 180, 36, Phaser.Math.DegToRad(-90), Phaser.Math.DegToRad(-90 + (360 * chargePercentage)), false);
            specialGraphics.strokePath();

            if (specialCharge >= specialMax) {
                specialReady = true;
                specialButton.setFillStyle(0x00ffff); 
                actionText.setText('SPECIAL READY!');
            }
        }
    }
</script>

</body>
</html>
