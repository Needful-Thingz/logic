<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolve Command Center | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
</head>
<body class="bg-gray-100 font-sans antialiased flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-slate-700 bg-slate-950">
            <span class="text-2xl font-extrabold tracking-wider text-blue-400">RESOLVE</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="#" class="flex items-center px-4 py-3 bg-blue-600 rounded-lg text-white font-medium"><i class="fas fa-home w-6"></i> Dashboard</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8">
            <h2 class="text-xl font-bold text-gray-800">Command Center</h2>
            <div class="h-8 w-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold">PM</div>
        </header>

        <div class="p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 border-l-4 border-l-blue-500">
                    <div class="text-sm font-medium text-gray-500 mb-1">Open Tickets</div>
                    <div class="text-3xl font-bold text-gray-900" id="ticket-count">0</div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h3 class="text-lg font-bold text-gray-800">Triage Queue</h3>
                    <button onclick="clearTickets()" class="text-red-500 hover:text-red-700 text-sm font-medium transition-colors">Clear Test Data</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white text-gray-500 text-sm border-b border-gray-200">
                                <th class="px-6 py-4 font-medium">Ticket ID</th>
                                <th class="px-6 py-4 font-medium">Property</th>
                                <th class="px-6 py-4 font-medium">Issue Diagnosed</th>
                                <th class="px-6 py-4 font-medium">Urgency</th>
                                <th class="px-6 py-4 font-medium text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="ticket-table-body" class="text-sm text-gray-700">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Function to load and display tickets from Local Storage
        function loadTickets() {
            const tableBody = document.getElementById('ticket-table-body');
            const tickets = JSON.parse(localStorage.getItem('resolve_tickets')) || [];
            
            document.getElementById('ticket-count').innerText = tickets.length;

            if (tickets.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">No active tickets. Your queue is clear!</td></tr>`;
                return;
            }

            tableBody.innerHTML = ''; // Clear table
            
            // Loop through database and build the HTML rows
            tickets.forEach(ticket => {
                let urgencyBadge = ticket.urgency === 'High' 
                    ? `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold uppercase tracking-wider">High</span>`
                    : `<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-xs font-bold uppercase tracking-wider">Routine</span>`;

                tableBody.innerHTML += `
                    <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 font-medium text-blue-600">${ticket.id}</td>
                        <td class="px-6 py-4">${ticket.property}</td>
                        <td class="px-6 py-4">
                            <span class="block font-medium text-gray-900">${ticket.issue}</span>
                            <span class="block text-xs text-gray-500 mt-1">${ticket.details}</span>
                        </td>
                        <td class="px-6 py-4">${urgencyBadge}</td>
                        <td class="px-6 py-4 text-right">
                            <button class="text-blue-600 hover:text-blue-800 font-medium text-sm">Review & Dispatch</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Utility to clear data during testing
        function clearTickets() {
            localStorage.removeItem('resolve_tickets');
            loadTickets();
        }

        // Run the load function immediately when the dashboard opens
        window.onload = loadTickets;
    </script>
</body>
</html>
