<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Weapon Loadout Simulator V6 (Stun, Armor & Attack Speed)</title>
<style>
  body { font-family: sans-serif; background: #111; color: #fff; text-align: center; margin: 0; padding: 20px; }
  .arena-box { background: #222; padding: 20px; border-radius: 10px; margin-bottom: 20px; position: relative; height: 150px; overflow: hidden; }
  .entity { position: absolute; bottom: 20px; }
  #player { background: #00aaff; left: 10%; width: 30px; height: 50px; position: absolute; bottom: 20px; transition: left 0.1s;}
  #dummy { background: #ff5555; right: 10%; width: 30px; height: 50px; position: absolute; bottom: 20px; transition: background-color 0.1s;}
  #hitbox { background: rgba(255, 170, 0, 0.7); height: 20px; position: absolute; bottom: 40px; left: calc(10% + 30px); width: 0px; transition: width 0.1s, background-color 0.1s, left 0.1s; opacity: 0; }
  
  .controls { text-align: left; background: #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
  label { display: block; margin-top: 15px; font-weight: bold; font-size: 16px; color: #aaa; }
  select, input[type=range] { width: 100%; height: 40px; margin-top: 5px; font-size: 16px; } 
  
  .stats { display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 16px; font-weight: bold; }
  .bar-container { width: 100%; background: #444; height: 20px; margin-top: 5px; border-radius: 5px; overflow: hidden;}
  .bar { height: 100%; transition: width 0.3s; }
  #health-bar { background: #00ff00; width: 100%; }
  #armor-bar { background: #cccccc; width: 100%; }
  
  #status-log { margin-bottom: 15px; font-size: 18px; font-weight: bold; color: #00ffff; height: 25px; }

  button { width: 100%; padding: 20px; margin-top: 10px; font-size: 20px; font-weight: bold; border: none; border-radius: 10px; text-transform: uppercase; }
  #strike-btn { background: #ffaa00; color: #000; }
  #reset-btn { background: #555; color: white; }
</style>
</head>
<body>

<h2>Weapon Loadout Simulator V6</h2>

<div id="status-log">Target is ready.</div>

<div class="stats">
  <div style="width: 45%;">
    HEALTH: <span id="health-val">100</span>
    <div class="bar-container"><div id="health-bar" class="bar"></div></div>
  </div>
  <div style="width: 45%;">
    ARMOR: <span id="armor-val">100</span>
    <div class="bar-container"><div id="armor-bar" class="bar"></div></div>
  </div>
</div>

<div class="arena-box">
  <div id="player"></div>
  <div id="hitbox"></div>
  <div id="dummy"></div>
</div>

<div class="controls">
  <label style="color: #00aaff;">Player Position (Walk Forward/Back):</label>
  <input type="range" id="position" min="5" max="80" value="10" oninput="updateUI()">

  <label>Equip Weapon (From Store):</label>
  <select id="weapon-select" onchange="loadWeapon()">
    <option value="custom">-- Custom Build --</option>
    <!-- ADDED data-speed to match Arena V6.2 -->
    <option value="knife" data-dmg="28" data-reach="40" data-pierce="15" data-stun="0" data-speed="80" data-color="rgba(200,200,200,0.8)">Starter Combat Knife (Close Assassin)</option>
    <option value="sword" data-dmg="35" data-reach="75" data-pierce="50" data-stun="0" data-speed="150" data-color="rgba(255,50,50,0.8)">Heavy Broadsword (Armor Breaker)</option>
    <option value="whip" data-dmg="12" data-reach="190" data-pierce="90" data-stun="1.0" data-speed="250" data-color="rgba(50,255,255,0.8)">Energy Whip (1s Stun / Shock)</option>
  </select>

  <!-- NEW SPEED SLIDER -->
  <label>Attack Speed (ms): <span id="speed-val" style="color: #fff;">150</span>ms</label>
  <input type="range" id="speed" min="50" max="500" value="150" oninput="updateUI()">

  <label>Damage Output: <span id="dmg-val" style="color: #fff;">20</span></label>
  <input type="range" id="dmg" min="5" max="60" value="20" oninput="updateUI()">

  <label>Physical Reach (Pixels): <span id="reach-val" style="color: #fff;">100</span></label>
  <input type="range" id="reach" min="30" max="300" value="100" oninput="updateUI()">

  <label>Armor Piercing (%): <span id="pierce-val" style="color: #fff;">20</span>%</label>
  <input type="range" id="pierce" min="0" max="100" value="20" oninput="updateUI()">

  <label>Stun Duration (Seconds): <span id="stun-val" style="color: #fff;">0</span>s</label>
  <input type="range" id="stun" min="0" max="3" step="0.5" value="0" oninput="updateUI()">
</div>

<button id="strike-btn" onclick="strike()">Execute Strike</button>
<button id="reset-btn" onclick="reset()">Reset Target</button>

<script>
  let health = 100;
  let armor = 100;
  let isStunned = false;
  let currentColor = "rgba(255, 170, 0, 0.7)";
  let isAttacking = false;

  function loadWeapon() {
    const select = document.getElementById('weapon-select');
    if (select.value === 'custom') return;
    
    const selectedOption = select.options[select.selectedIndex];
    document.getElementById('dmg').value = selectedOption.getAttribute('data-dmg');
    document.getElementById('reach').value = selectedOption.getAttribute('data-reach');
    document.getElementById('pierce').value = selectedOption.getAttribute('data-pierce');
    document.getElementById('stun').value = selectedOption.getAttribute('data-stun');
    document.getElementById('speed').value = selectedOption.getAttribute('data-speed'); // LOAD NEW SPEED
    currentColor = selectedOption.getAttribute('data-color');
    
    updateUI();
  }

  function updateUI() {
    const select = document.getElementById('weapon-select');
    const selectedOption = select.options[select.selectedIndex];
    
    if (select.value !== 'custom') {
        if (document.getElementById('dmg').value != selectedOption.getAttribute('data-dmg') || 
            document.getElementById('reach').value != selectedOption.getAttribute('data-reach') ||
            document.getElementById('pierce').value != selectedOption.getAttribute('data-pierce') ||
            document.getElementById('stun').value != selectedOption.getAttribute('data-stun') ||
            document.getElementById('speed').value != selectedOption.getAttribute('data-speed')) { // CHECK SPEED
            select.value = 'custom';
            currentColor = "rgba(255, 170, 0, 0.7)";
        }
    }

    document.getElementById('dmg-val').innerText = document.getElementById('dmg').value;
    document.getElementById('reach-val').innerText = document.getElementById('reach').value;
    document.getElementById('pierce-val').innerText = document.getElementById('pierce').value;
    document.getElementById('stun-val').innerText = document.getElementById('stun').value;
    document.getElementById('speed-val').innerText = document.getElementById('speed').value; // UPDATE SPEED TEXT
    
    let pos = document.getElementById('position').value;
    document.getElementById('player').style.left = pos + '%';
    
    // Only update visual reach when not attacking
    if(!isAttacking) {
        let hitboxElement = document.getElementById('hitbox');
        hitboxElement.style.width = document.getElementById('reach').value + 'px';
        hitboxElement.style.left = `calc(${pos}% + 30px)`;
        hitboxElement.style.backgroundColor = currentColor;
    }
  }

  function strike() {
    if (isAttacking) return; // Prevent spam clicking
    
    if (isStunned) {
        document.getElementById('status-log').innerText = "Target is STUNNED and cannot move!";
        return;
    }

    isAttacking = true;
    let dmg = parseInt(document.getElementById('dmg').value);
    let piercePercent = parseInt(document.getElementById('pierce').value) / 100;
    let stunDuration = parseFloat(document.getElementById('stun').value);
    let attackSpeed = parseInt(document.getElementById('speed').value); // GET SPEED

    let hitboxElement = document.getElementById('hitbox');
    let dummyElement = document.getElementById('dummy');
    
    // Animate the strike based on the weapon speed
    hitboxElement.style.opacity = "1";
    hitboxElement.style.transition = `opacity 0.05s`; // Snap appear
    
    setTimeout(() => {
        hitboxElement.style.transition = `opacity ${attackSpeed / 1000}s ease-in`; // Fade out based on speed
        hitboxElement.style.opacity = "0";
        setTimeout(() => isAttacking = false, attackSpeed); // Unlock button after speed duration
    }, 50); // Short delay so the user actually sees the flash

    let hitRect = hitboxElement.getBoundingClientRect();
    let dumRect = dummyElement.getBoundingClientRect();

    if (hitRect.right < dumRect.left) {
        document.getElementById('status-log').innerText = "Swing and a miss! Walk closer.";
        return;
    }

    // Damage calculations (Armor vs Health)
    let piercingDmg = dmg * piercePercent;
    let standardDmg = dmg - piercingDmg;

    if (armor > 0) {
        armor -= standardDmg;
        if (armor < 0) {
            health += armor; 
            armor = 0;
        }
    } else {
        health -= standardDmg;
    }

    health -= piercingDmg;
    if (health < 0) health = 0;

    // Visual strike feedback
    hitboxElement.style.background = "#ffffff";
    setTimeout(() => hitboxElement.style.background = currentColor, 100);

    let logMessage = `Hit landed! Dealt ${dmg} damage.`;

    // Handle Stun Effect
    if (stunDuration > 0) {
        isStunned = true;
        dummyElement.style.backgroundColor = "#00ffff"; 
        document.getElementById('status-log').innerText = `ZAPPED! Target frozen for ${stunDuration}s!`;
        
        setTimeout(() => {
            isStunned = false;
            dummyElement.style.backgroundColor = "#ff5555";
            document.getElementById('status-log').innerText = "Target recovered from stun.";
        }, stunDuration * 1000);
    } else {
        document.getElementById('status-log').innerText = logMessage;
    }

    updateBars();
  }

  function updateBars() {
    document.getElementById('health-val').innerText = Math.round(health);
    document.getElementById('health-bar').style.width = health + '%';
    
    document.getElementById('armor-val').innerText = Math.round(armor);
    document.getElementById('armor-bar').style.width = armor + '%';
  }

  function reset() {
    health = 100;
    armor = 100;
    isStunned = false;
    isAttacking = false;
    document.getElementById('dummy').style.backgroundColor = "#ff5555";
    document.getElementById('status-log').innerText = "Target reset.";
    updateBars();
  }

  updateUI();
</script>

</body>
</html>
